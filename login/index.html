<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="config.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d1b2a;
    --bg2: #162030;
    --bg3: #1e2d3d;
    --border: #2a3f55;
    --border-light: #e8cfa0;
    --text: #e8e4dc;
    --muted: #888;
    --muted2: #555;
    --accent: #c9a96e;
    --red: #c0392b;
    --white: #f0ece4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 32px 36px 28px;
    border-bottom: 1px solid var(--border);
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--white);
  }

  .card-header h1 em { font-style: italic; color: var(--accent); }

  .card-body { padding: 28px 36px 32px; }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-color: var(--border-light);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input::placeholder { color: var(--muted2); }
  .form-group input:focus { border-color: var(--accent); }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    background: none;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-primary { border-color: var(--accent); color: var(--accent); }
  .btn-primary:hover { background: var(--accent); color: var(--bg); }

  .btn-ghost { border-color: var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  .btn-google { border-color: var(--border); color: var(--text); }
  .btn-google:hover { border-color: var(--border-light); color: var(--white); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:active:not(:disabled) { opacity: 0.8; }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 20px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted2);
  }

  .reset-section {
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px solid var(--border);
  }

  .reset-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 12px;
  }

  .reset-row { display: flex; gap: 8px; }

  .reset-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 300;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .reset-row input::placeholder { color: var(--muted2); }
  .reset-row input:focus { border-color: var(--accent); }

  .reset-row button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 9px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .reset-row button:hover { border-color: var(--muted); color: var(--text); }

  .card-footer {
    padding: 14px 36px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .manage-link {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    text-decoration: none;
    transition: color 0.2s;
  }

  .manage-link:hover { color: var(--accent); }

  .google-icon { width: 14px; height: 14px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <a class="eyebrow" href="../index.html" target="_blank" style="text-decoration:none;cursor:pointer;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color=''">Molly Loch ↗</a>
    <h1>Sign <em>In</em></h1>
  </div>

  <div class="card-body">
    <form onsubmit="login(); return false;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
<!--
      <button type="button" class="btn btn-ghost" onclick="signup()">Sign Up</button>
-->            
    </form>

        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

    <div class="reset-section">
      <div class="reset-label">Reset Password</div>
      <form onsubmit="resetPassword(); return false;">
        <div class="reset-row">
          <input type="email" id="reset-email" placeholder="Enter your email">
          <button type="submit">Send Reset</button>
        </div>
      </form>
    </div>
  </div>

    <a class="manage-link" href="https://console.firebase.google.com/project/user-login-6f728/authentication/users" target="_blank">Manage Users ↗</a>

</div>

<script>
  auth.onAuthStateChanged(user => {
    if (user && !window.location.href.includes("message.html")) {
      window.location.href = "message.html";
    }
  });

  function signup() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    auth.createUserWithEmailAndPassword(email, password)
      .then(() => window.location.href = "message.html")
      .catch(err => alert(err.message));
  }

  function login() {
    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.textContent = "Signing in...";

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => { window.location.href = "message.html"; })
      .catch(err => {
        if (err.code === "auth/user-not-found") {
          auth.createUserWithEmailAndPassword(email, password)
            .then(() => window.location.href = "message.html")
            .catch(err => alert(err.message));
        } else {
          alert(err.message);
        }
        btn.disabled = false;
        btn.textContent = "Login";
      });
  }
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {

    document.getElementById("version").textContent = " " + SITE_VERSION;

    const login = document.getElementById("footerLogin");
    if (login) {
        login.href = ADMIN_LOGIN_URL;
    }

});
</script>

</html>
