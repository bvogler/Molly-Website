<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1b2a;
    --bg2: #162030;
    --bg3: #1e2d3d;
    --border: #2a3f55;
    --border-light: #e8cfa0;
    --text: #e8e4dc;
    --muted: #888;
    --muted2: #555;
    --accent: #c9a96e;
    --red: #c0392b;
    --white: #f0ece4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    font-size: 13px;
  }

  /* HEADER */
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--white);
    text-transform: uppercase;
  }

  .logo em { font-style: italic; color: var(--accent); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SECTION LABEL */
  .section-label {
    padding: 32px 48px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .section-label span {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* TOOLBAR */
  .toolbar {
    padding: 0 48px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
  }

  .toolbar-left { display: flex; align-items: center; gap: 12px; }

  .search-wrap { position: relative; }

  .search-wrap input {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1px;
    padding: 9px 14px 9px 36px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input::placeholder { color: var(--muted2); }
  .search-wrap input:focus { border-color: var(--accent); }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--muted2);
    pointer-events: none;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    background: none;
    color: var(--text);
    transition: all 0.2s;
  }

  .btn-primary { border-color: var(--accent); color: var(--accent); }
  .btn-primary:hover { background: var(--accent); color: var(--bg); }

  .btn-ghost { border-color: var(--border-light); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  .btn-danger { border-color: rgba(192,57,43,0.4); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: white; border-color: var(--red); }

  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .row-count { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .row-count strong { color: var(--text); font-weight: 500; }

  /* MAIN */
  main { padding: 0 48px 80px; }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    gap: 20px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 1px solid var(--border-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }

  /* TABLE */
  .table-wrap { border: 1px solid var(--border); background: var(--bg2); }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }

  thead tr { border-bottom: 1px solid var(--border-light); }
  thead th {
    padding: 14px 20px;
    text-align: left;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  thead th:hover { color: var(--accent); }
  thead th.actions-col { cursor: default; }
  thead th.actions-col:hover { color: var(--muted); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 13px 20px;
    color: var(--text);
    font-size: 12px;
    font-weight: 300;
    line-height: 1.5;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .actions-td { display: flex; gap: 8px; padding: 10px 20px; white-space: nowrap; }

  .btn-sm {
    padding: 5px 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    background: none;
    transition: all 0.15s;
  }

  .btn-edit { border-color: var(--border-light); color: var(--muted); }
  .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

  .btn-del { border-color: transparent; color: var(--muted2); }
  .btn-del:hover { border-color: rgba(192,57,43,0.4); color: var(--red); }

  .empty-row td {
    text-align: center;
    padding: 60px;
    color: var(--muted2);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
  }

  .table-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted2);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border-light);
    width: 100%;
    max-width: 500px;
    animation: modalIn 0.25s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes modalIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .modal-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white);
  }

  .modal-close {
    background: none; border: none;
    color: var(--muted2); font-size: 18px;
    cursor: pointer; line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 24px 28px; }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-color: var(--border-light);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 90px; }

  .modal-footer {
    padding: 18px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* CONFIRM */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 150;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.open { display: flex; }

  .confirm-box {
    background: var(--bg2);
    border: 1px solid var(--border-light);
    padding: 40px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .confirm-box h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 14px;
  }

  .confirm-box p { font-size: 12px; color: var(--muted); line-height: 1.8; margin-bottom: 28px; }
  .confirm-box .btns { display: flex; gap: 12px; justify-content: center; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--bg3);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 13px 22px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 200;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: rgba(192,57,43,0.5); color: var(--red); }

  @media (max-width: 640px) {
    header, .toolbar, .section-label, main { padding-left: 20px; padding-right: 20px; }
    .search-wrap input { width: 160px; }
  }
</style>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
<script src="auth.js"></script>
</head>
<body>

<header>
  <div style="display:flex;flex-direction:column;gap:4px;">
    <a href="../index.html" target="_blank" style="font-family:'Montserrat',sans-serif;font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Molly Loch ↗</a>
    <div class="logo">Messages <em>Manager</em></div>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="user-email" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    </div>
    <button class="btn btn-ghost" style="margin:0;width:auto;padding:6px 14px;" onclick="logout()">Logout</button>
  </div>
</header>

<div class="section-label"><span>Inbox</span></div>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search..." oninput="filterTable()">
    </div>
    <button class="btn btn-ghost" onclick="loadData()">↻ Refresh</button>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="row-count" id="rowCount"></span>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Row</button>
  </div>
</div>

<main>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading from Google Sheets</p>
  </div>

  <div class="table-wrap" id="tableWrap" style="display:none;">
    <div class="table-scroll">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="table-footer">
      <span id="lastUpdated"></span>
      <span>Connected · Google Sheets</span>
    </div>
  </div>
</main>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Row</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteFromModal()" style="display:none;margin-right:auto;">Delete</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Delete Row</h3>
    <p>This will permanently remove the row from your Google Sheet.<br>This action cannot be undone.</p>
    <div class="btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Protect page - redirect to login if not authenticated
  protectPage();

  // Show logged-in user email
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('user-email').textContent = user.email;
    }
  });

  const API_URL = "https://script.google.com/macros/s/AKfycbyKqSVfV2PN_juRzZ2Q1TspqpZQoXOcgyR9u1ZgWVK7NxE13ux_tNT08XGjSdZLKp9WBA/exec";

  let allRows = [], headers = [], editingIndex = -1, deletingIndex = -1;

  async function loadData() {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('tableWrap').style.display = 'none';
    try {
      const res = await fetch(API_URL + "?t=" + Date.now());
      const data = await res.json();
      if (!data || data.length < 1) throw new Error("No data");
      headers = data[0];
      allRows = data.slice(1);
      renderTable(allRows);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('tableWrap').style.display = 'block';
      document.getElementById('lastUpdated').textContent = 'Synced ' + new Date().toLocaleTimeString();
      updateCount(allRows.length);
    } catch(e) {
      document.getElementById('loading').innerHTML = `<p style="color:#c0392b;font-size:11px;letter-spacing:2px;">⚠ Failed to connect. Check your Apps Script URL.</p>`;
    }
  }

  function renderTable(rows) {
    // Skip columns 5 and 6 (0-based index 4 and 5)
    const skip = new Set([4, 5]);
    // Find timestamp column (move to last)
    const tsIndex = headers.findIndex(h => /timestamp/i.test(h));
    // Visible columns: exclude skipped and timestamp
    const visibleCols = headers
      .map((h, i) => ({ h, i }))
      .filter(({ i }) => !skip.has(i) && i !== tsIndex);

    document.getElementById('tableHead').innerHTML = '<tr>' +
      '<th class="actions-col"></th>' +
      visibleCols.map(({ h }) => `<th>${escHtml(h)}</th>`).join('') +
      (tsIndex !== -1 ? `<th>${escHtml(headers[tsIndex])}</th>` : '') +
      '</tr>';

    const tbody = document.getElementById('tableBody');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="${visibleCols.length + 2}">No entries found</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(row => {
      const ri = allRows.indexOf(row);
      return `<tr>
        <td><div class="actions-td">
          <button class="btn-sm btn-edit" onclick="openEditModal(${ri})">Edit</button>
          <button class="btn-sm btn-del" onclick="openConfirm(${ri})">Delete</button>
        </div></td>
        ${visibleCols.map(({ i }) => `<td title="${escHtml(row[i]??'')}">${escHtml(row[i]??'')}</td>`).join('')}
        ${tsIndex !== -1 ? `<td title="${escHtml(row[tsIndex]??'')}">${escHtml(row[tsIndex]??'')}</td>` : ''}
      </tr>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const f = q ? allRows.filter(r => r.some(c => String(c).toLowerCase().includes(q))) : allRows;
    renderTable(f); updateCount(f.length);
  }

  function updateCount(n) {
    document.getElementById('rowCount').innerHTML = `<strong>${n}</strong> of <strong>${allRows.length}</strong> rows`;
  }

  function openAddModal() {
    editingIndex = -1;
    document.getElementById('modalTitle').textContent = 'Add Row';
    document.getElementById('modalBody').innerHTML = buildForm(headers.map(()=>''));
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function openEditModal(i) {
    editingIndex = i;
    document.getElementById('modalTitle').textContent = 'Edit Row';
    document.getElementById('modalBody').innerHTML = buildForm(allRows[i]);
    document.getElementById('deleteBtn').style.display = 'inline-flex';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function deleteFromModal() {
    closeModal();
    openConfirm(editingIndex);
  }

  function buildForm(values) {
    return headers.map((h,i) => {
      const isLong = /message|note|comment|body/i.test(h);
      return `<div class="form-group">
        <label>${escHtml(h)}</label>
        ${isLong
          ? `<textarea id="field_${i}" placeholder="${escHtml(h)}">${escHtml(values[i]??'')}</textarea>`
          : `<input type="text" id="field_${i}" placeholder="${escHtml(h)}" value="${escHtml(values[i]??'')}">`}
      </div>`;
    }).join('');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  async function saveRow() {
    const btn = document.getElementById('saveBtn');
    const rowData = headers.map((_,i) => { const el = document.getElementById(`field_${i}`); return el?el.value:''; });
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      if (editingIndex === -1) {
        await postAction({action:'add', rowData});
        allRows.push(rowData);
        showToast('Row added','success');
      } else {
        await postAction({action:'edit', rowIndex:editingIndex+1, rowData});
        allRows[editingIndex] = rowData;
        showToast('Row updated','success');
      }
      closeModal(); filterTable(); updateCount(allRows.length);
      document.getElementById('lastUpdated').textContent = 'Synced ' + new Date().toLocaleTimeString();
    } catch(e) { showToast('Failed to save','error'); }
    btn.disabled=false; btn.textContent='Save';
  }

  function openConfirm(i) {
    deletingIndex = i;
    document.getElementById('confirmOverlay').classList.add('open');
    document.getElementById('confirmDeleteBtn').onclick = async () => {
      closeConfirm();
      try {
        await postAction({action:'delete', rowIndex:deletingIndex+1});
        allRows.splice(deletingIndex,1);
        filterTable(); updateCount(allRows.length);
        showToast('Row deleted','success');
      } catch(e) { showToast('Failed to delete','error'); }
    };
  }

  function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }

  async function postAction(payload) {
    const res = await fetch(API_URL, {method:'POST', body:JSON.stringify(payload)});
    const data = await res.json();
    if (data.status !== 'ok') throw new Error('API error');
    return data;
  }

  let toastTimer;
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.className='toast',3000);
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  loadData();
</script>
</body>
</html>
